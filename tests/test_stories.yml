version: "3.1"

stories:

# --- GREET / GOODBYE ---

- story: test_saudacao
  steps:
  - user: |
      Olá
    intent: greet
  - action: utter_greet

- story: test_despedida
  steps:
  - user: |
      Adeus
    intent: goodbye
  - action: utter_goodbye

- story: test_saudacao_e_despedida
  steps:
  - user: |
      Bom dia
    intent: greet
  - action: utter_greet
  - user: |
      Até logo
    intent: goodbye
  - action: utter_goodbye

