version: "3.1"

stories:

# --- GREET / GOODBYE ---

- story: test_saudacao
  steps:
  - user: |
      Olá
    intent: greet
  - action: utter_greet

- story: test_despedida
  steps:
  - user: |
      Adeus
    intent: goodbye
  - action: utter_goodbye

- story: test_saudacao_e_despedida
  steps:
  - user: |
      Bom dia
    intent: greet
  - action: utter_greet
  - user: |
      Até logo
    intent: goodbye
  - action: utter_goodbye

# --- IDENTIDADE ---

- story: test_identidade_pt
  steps:
  - user: |
      quem és?
    intent: ask_identity
  - action: utter_identity

- story: test_identidade_en
  steps:
  - user: |
      who are you?
    intent: ask_identity
  - action: utter_identity

# --- HORÁRIO (custom action não é executado em rasa test; testa apenas o trigger da regra) ---

- story: test_horario_trigger
  steps:
  - user: "Que aulas tenho [segunda](day)?"
    intent: ask_schedule
  - action: action_pre_schedule

- story: test_horario_trigger_terca
  steps:
  - user: "O meu horário de [terça](day)"
    intent: ask_schedule
  - action: action_pre_schedule

- story: test_horario_trigger_manha
  steps:
  - user: "Que aulas tenho [segunda](day) [de manhã]{\"entity\": \"time_of_day\", \"value\": \"manhã\"}?"
    intent: ask_schedule
  - action: action_pre_schedule

# --- CANTINA ---

- story: test_cantina_com_localizacao_deti
  steps:
  - user: "Qual a cantina mais próxima do [DETI](location)?"
    intent: ask_nearest_canteen
  - action: canteen_form
  - active_loop: canteen_form
  - active_loop: null
  - action: action_get_nearest_canteen

- story: test_cantina_com_localizacao_biblioteca
  steps:
  - user: "Onde posso almoçar perto da [biblioteca](location)?"
    intent: ask_nearest_canteen
  - action: canteen_form
  - active_loop: canteen_form
  - active_loop: null
  - action: action_get_nearest_canteen

# --- LOCAIS CONHECIDOS ---

- story: test_locais_conhecidos
  steps:
  - user: |
      Que locais conheces?
    intent: ask_known_locations
  - action: action_get_known_locations

# --- EMENTA ---

- story: test_ementa_almoco_santiago
  steps:
  - user: "O que há para [almoço](meal_type) no [Refeitório de Santiago](canteen)?"
    intent: ask_menu
  - action: menu_form
  - active_loop: menu_form
  - active_loop: null
  - action: action_get_menu

- story: test_ementa_jantar_estga
  steps:
  - user: "Ementa de [jantar](meal_type) da [Cantina do ESTGA](canteen)?"
    intent: ask_menu
  - action: menu_form
  - active_loop: menu_form
  - active_loop: null
  - action: action_get_menu

# --- EXAMES ---

- story: test_exame_ipfln
  steps:
  - user: "Quando é o exame de [IPFLN](subject)?"
    intent: ask_exam_info
  - action: exam_query_form
  - active_loop: exam_query_form
  - active_loop: null
  - action: action_get_exam_info

- story: test_exame_bases_dados
  steps:
  - user: "A que horas é o exame de [Bases de Dados](subject)?"
    intent: ask_exam_info
  - action: exam_query_form
  - active_loop: exam_query_form
  - active_loop: null
  - action: action_get_exam_info

# --- FORA DE SCOPE ---

- story: test_out_of_scope_meteo
  steps:
  - user: |
      Como está o tempo hoje?
    intent: out_of_scope
  - action: utter_out_of_scope

- story: test_out_of_scope_futebol
  steps:
  - user: |
      Quem ganhou o Benfica ontem?
    intent: out_of_scope
  - action: utter_out_of_scope
